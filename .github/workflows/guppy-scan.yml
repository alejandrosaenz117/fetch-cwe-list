name: Guppy Security Scan

on:
  pull_request:
    types: [ opened, synchronize, reopened ]

permissions:
  contents: read
  pull-requests: write

jobs:
  guppy-scan:
    runs-on: ubuntu-latest
    name: Security Scan
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Guppy Security Scanner
        uses: alejandrosaenz117/guppy-agent@cac76b41208c869f223062edc47a8d3d63b0edb1
        with:
          provider: anthropic
          model: claude-sonnet-4-6
          fail_on_severity: high
          sca_enabled: true
          post_comments: true
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
